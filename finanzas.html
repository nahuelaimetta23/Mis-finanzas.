function save(d){try{localStorage.setItem(SK,JSON.stringify(d));return true}catch(e){console.error(e);return false}}

// ═══════════ HELPERS ═══════════
const getR=tc=>tc[tc.mode]||tc.blue||1450;
const toARS=(t,tc)=>t.currency==='ARS'?t.amount:t.amount*getR(tc);
const nowKey=()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`};
const prevMs=n=>{const now=new Date(),r=[];for(let i=n-1;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);r.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`)}return r};
const fARS=n=>'$'+Math.round(n).toLocaleString('es-AR');
const fUSD=n=>'U$D '+Math.round(Math.abs(n)).toLocaleString('en-US');
const today=()=>new Date().toISOString().slice(0,10);
const dUntil=ds=>ds?Math.ceil((new Date(ds).getTime()-Date.now())/86400000):null;
const greet=()=>{const h=new Date().getHours();return h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches'};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const getCats=(type,data)=>type==='income'?[...DEF_INC,...(data.customCategories?.income||[]).map(c=>c.name)]:[...DEF_EXP,...(data.customCategories?.expense||[]).map(c=>c.name)];
const catCol=(name,data)=>{if(BASE_COL[name])return BASE_COL[name];const all=[...(data.customCategories?.expense||[]),...(data.customCategories?.income||[])];return all.find(c=>c.name===name)?.color||C.muted};
function mergeInit(d){return{...INIT,...d,wallets:d.wallets||INIT.wallets,cards:d.cards||INIT.cards,goals:d.goals||INIT.goals,fixedExpenses:d.fixedExpenses||[],transactions:d.transactions||[],categoryBudgets:d.categoryBudgets||{},customCategories:d.customCategories||{expense:[],income:[]}}}
function autoFixed(data){
  const mk=nowKey();
  const recurring=data.fixedExpenses.filter(f=>f.recurring);
  if(!recurring.length)return data;
  if(data.transactions.some(t=>t.isFixed&&t.date.startsWith(mk)))return data;
  const now=new Date();
  const newTxs=recurring.map(f=>({id:`fx-${f.id}-${mk}`,type:'expense',category:f.category,amount:f.amount,currency:'ARS',wallet:f.wallet||'naranjax',date:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(Math.min(f.day||1,28)).padStart(2,'0')}`,note:f.name,installments:1,installmentNum:1,isFixed:true,fixedId:f.id}));
  return{...data,transactions:[...data.transactions,...newTxs]};
}

function Dot({col,size=8}){return html`<span style=${{display:'inline-block',width:size,height:size,borderRadius:'50%',background:col,flexShrink:0}}/>`}

// ═══════════ SVG CHARTS ═══════════
function DonutChart({data,size=180}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return html`<p style=${{color:C.muted,textAlign:'center',padding:24,fontSize:13}}>Sin datos.</p>`;
  const cx=size/2,cy=size/2,R=size*.38,r=size*.22;
  let a=-Math.PI/2;
  const paths=data.map((d,i)=>{
    const da=(d.value/total)*Math.PI*2;
    const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a);
    const x2=cx+R*Math.cos(a+da),y2=cy+R*Math.sin(a+da);
    const xi1=cx+r*Math.cos(a),yi1=cy+r*Math.sin(a);
    const xi2=cx+r*Math.cos(a+da),yi2=cy+r*Math.sin(a+da);
    const lg=da>Math.PI?1:0;
    const path=`M${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z`;
    a+=da;
    return html`<path key=${i} d=${path} fill=${d.color} stroke="#08090d" stroke-width="1.5"/>`;
  });
  return html`<svg width=${size} height=${size} viewBox=${`0 0 ${size} ${size}`}>${paths}</svg>`;
}

function BarChartSVG({bars,keys,colors,h=180}){
  const vals=bars.flatMap(b=>keys.map(k=>b[k]||0));
  const max=Math.max(...vals,1);
  const bw=90/bars.length,pad=10;
  return html`<svg width="100%" height=${h} viewBox=${`0 0 100 ${h}`} preserveAspectRatio="none">
    ${bars.map((b,i)=>html`<g key=${i}>
      ${keys.map((k,j)=>{
        const v=(b[k]||0)/max*(h-pad-8);
        const x=5+i*bw+j*(bw/keys.length);
        const bww=bw/keys.length-0.5;
        return v>0?html`<rect key=${j} x=${x} y=${h-pad-v} width=${bww} height=${v} fill=${colors[j]} rx="1"/>`:null;
      })}
      <text x=${5+i*bw+bw/2} y=${h-1} text-anchor="middle" fill=${C.muted} font-size="4.5">${b.label}</text>
    </g>`)}
  </svg>`;
}

// ═══════════ APP ROOT ═══════════
function App(){
  const [data,setData]=useState(null);
  const [tab,setTab]=useState('inicio');
  const [form,setForm]=useState(false);
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    const d=load();
    if(d)setData(autoFixed(mergeInit(d)));
    else setData({...INIT,wallets:INIT.wallets.map(w=>({...w})),cards:INIT.cards.map(c=>({...c})),goals:INIT.goals.map(g=>({...g}))});
  },[]);

  const persist=useCallback(next=>{
    setData(next);
    if(!save(next))showT('⚠️ Error al guardar — revisá el almacenamiento','err');
  },[]);

  const showT=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800)};

  if(!data)return html`<div style=${{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:C.bg,color:C.muted,gap:14}}>

    <p style=${{fontSize:13}}>Cargando…</p>

  if(!data.onboarded)return html`<${Onboarding} data=${data} persist=${persist}/>`;

  const TABS=[{id:'inicio',icon:'⌂',l:'Inicio'},{id:'movs',icon:'↕',l:'Movs'},{id:'tarj',icon:'▣',l:'Tarjetas'},{id:'graf',icon:'◈',l:'Análisis'},{id:'metas',icon:'◎',l:'Metas'},{id:'ia',icon:'✦',l:'IA'},{id:'cfg',icon:'⚙',l:'Config'}];

  return html`<div style=${{background:C.bg,minHeight:'100vh',paddingBottom:88}}>
    <div style=${{padding:'0 16px 12px'}}>
      ${tab==='inicio'&&html`<${TabInicio} data=${data} persist=${persist} toast=${showT}/>`}
      ${tab==='movs'  &&html`<${TabMovs}   data=${data} persist=${persist} toast=${showT}/>`}
      ${tab==='tarj'  &&html`<${TabTarj}   data=${data} persist=${persist} toast=${showT}/>`}
      ${tab==='graf'  &&html`<${TabGraf}   data=${data}/>`}
      ${tab==='metas' &&html`<${TabMetas}  data=${data} persist=${persist} toast=${showT}/>`}
      ${tab==='ia'    &&html`<${TabIA}     data=${data} persist=${persist} toast=${showT}/>`}
      ${tab==='cfg'   &&html`<${TabCfg}    data=${data} persist=${persist} toast=${showT}/>`}
    </div>
    ${tab!=='ia'&&tab!=='cfg'&&html`<button style=${{position:'fixed',bottom:90,right:18,width:52,height:52,borderRadius:'50%',background:C.green,color:'#000',border:'none',fontSize:26,fontWeight:900,cursor:'pointer',boxShadow:`0 4px 20px ${C.green}44`,zIndex:40,display:'flex',alignItems:'center',justifyContent:'center'}} onClick=${()=>setForm(true)}>＋</button>`}
    <nav style=${{position:'fixed',bottom:0,left:0,right:0,background:C.c1,borderTop:`1px solid ${C.border}`,display:'flex',zIndex:30,maxWidth:480,margin:'0 auto'}}>
      ${TABS.map(t=>html`<button key=${t.id} style=${{flex:1,background:'transparent',border:'none',padding:'7px 2px 11px',fontSize:9,fontWeight:600,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===t.id?C.green:C.muted,position:'relative'}} onClick=${()=>setTab(t.id)}>
        ${tab===t.id&&html`<div style=${{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:20,height:2,background:C.green,borderRadius:99}}/>`}
        <span style=${{fontSize:15}}>${t.icon}</span><span>${t.l}</span>
      </button>`)}
    </nav>
    ${form&&html`<${TxForm} data=${data} persist=${persist} onClose=${()=>setForm(false)} toast=${showT}/>`}
    ${toast&&html`<div style=${{position:'fixed',bottom:96,left:'50%',transform:'translateX(-50%)',borderRadius:12,padding:'10px 22px',color:toast.type==='ok'?'#000':'#fff',background:toast.type==='ok'?C.green:C.red,fontSize:14,fontWeight:700,zIndex:99,pointerEvents:'none',whiteSpace:'nowrap',boxShadow:`0 4px 18px ${toast.type==='ok'?C.green:C.red}44`}}>${toast.msg}</div>`}

// ═══════════ ONBOARDING ═══════════

    </div>`)}
    <div style=${sRow2}><button style=${{...sBtnSm,flex:1}} onClick=${()=>setStep(0)}>← Atrás</button><button style=${{...sBtn(C.green,'#000',0),flex:2}} onClick=${()=>setStep(2)}>Siguiente →</button></div>
  </div>`;

  if(step===2)return html`<div style=${W} class="fade">
    <div style=${{display:'flex',gap:4,marginBottom:24}}>${[0,1,2,3].map(i=>html`<div key=${i} style=${{flex:1,height:3,borderRadius:99,background:i<2?C.green:C.c3}}/>`)}</div>
    <h2 style=${{fontSize:20,fontWeight:900,marginBottom:16}}>Tarjetas</h2>
    ${cs.map(c=>html`<div key=${c.id} style=${sCard2()}>
      <p style=${{fontWeight:700,fontSize:14,marginBottom:10}}>💳 ${c.name}</p>

      </div>

    <div style=${sRow2}><button style=${{...sBtnSm,flex:1}} onClick=${()=>setStep(1)}>← Atrás</button><button style=${{...sBtn(C.green,'#000',0),flex:2}} onClick=${()=>setStep(3)}>Siguiente →</button></div>

// ═══════════ TAB INICIO ═══════════

      </div>

        <p style=${{fontSize:11,color:C.muted}}>${fUSD(patri/r)}</p>

    </div>

    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      ${[
        {l:'Ingresos',v:fARS(inc),s:fUSD(inc/r),col:C.green,bg:C.gdark,icon:'↑'},
        {l:'Gastos',v:fARS(exp),s:fUSD(exp/r),col:C.red,bg:C.rdark,icon:'↓'},
        {l:'Ahorro',v:fARS(Math.abs(sav)),s:`${savPct}% del ingreso`,col:sav>=0?C.green:C.red,bg:sav>=0?C.gdark:C.rdark,icon:sav>=0?'✓':'!'},
        {l:'Fijos/mes',v:fARS(fixedM),s:fUSD(fixedM/r),col:C.orange,bg:'#1e1100',icon:'⚓'},
      ].map(m=>html`<div key=${m.l} style=${{background:m.bg,borderRadius:14,padding:14,border:`1px solid ${m.col}22`}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

          <span style=${{width:22,height:22,background:m.col+'22',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:m.col}}>${m.icon}</span>

        <p style=${{fontSize:10,color:m.col+'99',marginTop:3}}>${m.s}</p>
      </div>`)}
    </div>

    ${yieldM>0&&html`<div style=${{...sCard({borderLeft:`3px solid ${C.green}`,background:C.gdark}),display:'flex',alignItems:'center',gap:12,padding:14,marginBottom:12}}>

    ${alerts.length>0&&html`<div style=${sCard({border:`1px solid ${C.yellow}44`,background:'#131000'})}>

      ${varTxs.map(t=>{
        const col=t.type==='income'?C.green:t.type==='transfer'?C.blue:C.red;
        return html`<div key=${t.id} style=${{...sCard2(),display:'flex',gap:10,alignItems:'center'}}>

            <p style=${{fontSize:11,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${t.date} · ${data.wallets.find(w=>w.id===t.wallet)?.name||t.wallet}${t.note?` · ${t.note}`:''}</p>

        <${Dot} col=${e.color}/><span style=${{flex:1,fontSize:13}}>${e.name}</span><span style=${{fontSize:13,fontWeight:700}}>${fARS(e.value)}</span>

      <div style=${{display:'flex',gap:12,marginTop:8,justifyContent:'center'}}>

// ═══════════ TAB IA ═══════════
function TabIA({data,persist,toast}){
  const [msgs,setMsgs]=useState([]);
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [iaReady,setIaReady]=useState(null); // null=checking, true=ok, false=error
  const endRef=useRef(null);
  const tc=data.tc,r=getR(tc);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,busy]);
  useEffect(()=>{
    // Verificar que la función de Netlify está disponible
    fetch('/.netlify/functions/chat',{method:'OPTIONS'})
      .then(()=>setIaReady(true))
      .catch(()=>setIaReady(false));
  },[]);

  const ctx=()=>{
    const ms3=prevMs(3);
    const aI=ms3.map(m=>data.transactions.filter(t=>t.type==='income'&&t.date.startsWith(m)).reduce((s,t)=>s+toARS(t,tc),0)).reduce((a,b)=>a+b,0)/3;
    const aE=ms3.map(m=>data.transactions.filter(t=>t.type==='expense'&&t.date.startsWith(m)).reduce((s,t)=>s+toARS(t,tc),0)).reduce((a,b)=>a+b,0)/3;
    const patri=data.wallets.reduce((s,w)=>s+w.balance+(w.balanceUSD||0)*r,0);
    const goal=data.goals[0];
    return `Asistente financiero de ${data.name} (Argentina). Hoy: ${today()}.
BILLETERAS: ${data.wallets.map(w=>`"${w.id}":${w.name}[ARS:${fARS(w.balance)},USD:${fUSD(w.balanceUSD||0)},TNA:${w.tna||0}%]`).join(' ')}
TARJETAS: ${data.cards.map(c=>`"${c.id}":${c.name}`).join(' ')}
CATS GASTO: ${getCats('expense',data).join(',')}
CATS INGRESO: ${getCats('income',data).join(',')}
DATOS: Ingreso ~${fARS(aI)}/mes, Gasto ~${fARS(aE)}/mes, Ahorro ${aI>0?Math.round((aI-aE)/aI*100):0}%, Patrimonio ${fARS(patri)}/${fUSD(patri/r)}
META: ${goal?.name} → ${Math.round((goal?.currentUSD||0)/(goal?.targetUSD||1)*100)}% (faltan ${fUSD((goal?.targetUSD||0)-(goal?.currentUSD||0))})
TC ${tc.mode}: $${r.toLocaleString('es-AR')}

Respondé SIEMPRE con JSON puro válido sin markdown:
Transacción → {"action":"transaction","data":{"type":"expense|income|transfer","category":"EXACTA","amount":N,"currency":"ARS|USD","wallet":"ID","date":"YYYY-MM-DD","note":"","installments":1},"summary":"texto"}
Otro → {"action":"answer","text":"respuesta ≤4 oraciones"}
Reglas: gasté/pagué→expense naranjax; cobré/sueldo→income galicia; fecha default: ${today()}`;
  };

  const send=async()=>{
    const text=q.trim();if(!text||busy)return;
    setQ('');const um={id:uid(),role:'user',content:text};
    const nms=[...msgs,um];setMsgs(nms);setBusy(true);
    try{
      const hist=nms.slice(-8).map(m=>({role:m.role,content:m.content}));
      const res=await fetch('https://finanzas.nahuelaimetta.workers.dev',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:hist,systemPrompt:ctx()})
      });
      if(!res.ok){const err=await res.json();throw new Error(err.error||'Error del servidor')}
      const d=await res.json();
      const raw=d.text||'{}';
      let p;try{p=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch{p={action:'answer',text:raw}};
      if(p.action==='transaction'&&p.data)setMsgs(prev=>[...prev,{id:uid(),role:'assistant',content:p.summary||'Detecté esta transacción:',txData:p.data}]);
      else setMsgs(prev=>[...prev,{id:uid(),role:'assistant',content:p.text||raw}]);
    }catch(e){setMsgs(prev=>[...prev,{id:uid(),role:'assistant',content:`Error: ${e.message}. ¿Está configurada la GEMINI_API_KEY en Netlify?`}])}
    setBusy(false);
  };

  const confirm=(msgId,tx)=>{
    const t={id:uid(),type:tx.type||'expense',category:tx.category||DEF_EXP[0],amount:Number(tx.amount)||0,currency:tx.currency||'ARS',wallet:tx.wallet||'naranjax',date:tx.date||today(),note:tx.note||'',installments:1,installmentNum:1};
    persist({...data,transactions:[...data.transactions,t]});
    setMsgs(prev=>prev.map(m=>m.id===msgId?{...m,txData:null,content:`✅ Guardado: ${t.category} · ${fARS(t.currency==='ARS'?t.amount:t.amount*r)}`}:m));
    toast('Registrado desde IA ✓');
  };

  const SUGG=['¿Cómo van mis finanzas?','Gasté $15.000 en comida hoy','Cobré el sueldo, 480.000 pesos','¿Cuándo llego a mi meta?','Dame consejos para ahorrar'];

  return html`<div style=${{paddingTop:20,paddingBottom:16}} class="fade">
    <h2 style=${{fontSize:20,fontWeight:900,marginBottom:4}}>✦ Asistente IA</h2>
    <p style=${{fontSize:12,color:C.sub,marginBottom:16,lineHeight:1.6}}>Preguntá sobre tus finanzas o describí un movimiento para registrarlo automáticamente.</p>
    ${iaReady===false&&html`<div style=${sCard({border:`1px solid ${C.yellow}44`,background:'#131000'})}>
      <p style=${{fontSize:14,fontWeight:700,color:C.yellow,marginBottom:8}}>⚠️ IA no disponible</p>
      <p style=${{fontSize:13,color:C.sub,lineHeight:1.6}}>La función de backend no responde. Verificá que la app está desplegada en Netlify y que configuraste la variable <b>GEMINI_API_KEY</b> en el panel de Netlify.</p>
    </div>`}
    ${html`<div>
      ${msgs.length===0&&html`<div style=${{marginBottom:16}}>${SUGG.map(s=>html`<button key=${s} style=${{...sChip(false),display:'block',width:'100%',textAlign:'left',marginBottom:8,padding:'10px 14px',whiteSpace:'normal'}} onClick=${()=>setQ(s)}>${s}</button>`)}</div>`}
      <div style=${{minHeight:160,marginBottom:12}}>
        ${msgs.map(m=>html`<div key=${m.id} style=${{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',marginBottom:10}}>
          <div style=${{maxWidth:'85%',padding:'10px 14px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?C.gdark:C.c2,border:`1px solid ${m.role==='user'?C.green+'44':C.c3}`,fontSize:13,lineHeight:1.6}}>
            ${m.content.split('\n').map((l,i)=>html`<p key=${i} style=${{margin:'2px 0'}}>${l}</p>`)}
            ${m.txData&&html`<div style=${{marginTop:10,padding:12,background:C.c3,borderRadius:10,border:`1px solid ${C.green}33`}}>
              <p style=${{fontSize:12,color:C.muted,marginBottom:6}}>Datos detectados</p>
              <p style=${{fontSize:14,fontWeight:700}}>${m.txData.type==='income'?'↑':'↓'} ${m.txData.category} · <span style=${{color:m.txData.type==='income'?C.green:C.red}}>${fARS(m.txData.currency==='ARS'?m.txData.amount:(m.txData.amount||0)*r)}</span></p>
              <p style=${{fontSize:11,color:C.muted,marginTop:2}}>${data.wallets.find(w=>w.id===m.txData.wallet)?.name||m.txData.wallet} · ${m.txData.date}</p>
              <div style=${{...sRow2,marginTop:10}}>
                <button style=${{flex:1,background:C.green,border:'none',borderRadius:8,padding:'8px',color:'#000',fontWeight:800,cursor:'pointer',fontSize:12}} onClick=${()=>confirm(m.id,m.txData)}>Confirmar ✓</button>
                <button style=${{flex:1,...sBtnSm,fontSize:12,textAlign:'center'}} onClick=${()=>setMsgs(prev=>prev.map(x=>x.id===m.id?{...x,txData:null,content:'Descartado.'}:x))}>Descartar</button>
              </div>
            </div>`}
          </div>
        </div>`)}
        ${busy&&html`<div style=${{display:'flex',justifyContent:'flex-start',marginBottom:10}}><div style=${{padding:'10px 14px',background:C.c2,borderRadius:'16px 16px 16px 4px',border:`1px solid ${C.c3}`,color:C.muted,fontSize:13}}>Analizando…</div></div>`}
        <div ref=${endRef}/>
      </div>
      <div style=${{...sRow2,position:'sticky',bottom:96}}>
        <input style=${{...sInp,flex:1}} placeholder="Escribí un movimiento o pregunta..." value=${q} onInput=${e=>setQ(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&!e.shiftKey&&send()}/>
        <button style=${{background:C.green,border:'none',borderRadius:10,padding:'0 16px',color:'#000',fontWeight:900,cursor:'pointer',fontSize:20,flexShrink:0,height:44}} onClick=${send}>→</button>
      </div>
    </div>`}

}

  const delWallet=id=>{if(!confirm('¿Eliminar esta cuenta?'))return;persist({...data,wallets:data.wallets.filter(w=>w.id!==id)});toast('Eliminada')};
  const addCat=()=>{if(!nc.name)return;const f=nc.type==='expense'?'expense':'income';persist({...data,customCategories:{...(data.customCategories||{}),[f]:[...(data.customCategories?.[f]||[]),{id:uid(),name:nc.name,color:nc.color,type:nc.type}]}});setNc({name:'',color:PALETTE[0],type:'expense'});toast('Categoría agregada ✓')};
  const delCat=(id,type)=>{const f=type==='expense'?'expense':'income';persist({...data,customCategories:{...(data.customCategories||{}),[f]:(data.customCategories?.[f]||[]).filter(c=>c.id!==id)}});toast('Eliminada')};

  const CP=({val,onChange})=>html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>${PALETTE.map(c=>html`<button key=${c} onClick=${()=>onChange(c)} style=${{width:26,height:26,borderRadius:'50%',background:c,border:val===c?'3px solid #fff':'3px solid transparent',cursor:'pointer'}}/>`)}</div>`;
  const SECS=[['cuentas','Cuentas'],['tarjetas','Tarjetas'],['cats','Categorías'],['tc','TC'],['ia','IA'],['datos','Datos']];

  return html`<div style=${{paddingTop:20}} class="fade">
    <h2 style=${{fontSize:20,fontWeight:900,marginBottom:14}}>Configuración</h2>
    <div style=${{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
      ${SECS.map(([v,l])=>html`<button key=${v} style=${{...sChip(sec===v),flexShrink:0}} onClick=${()=>setSec(v)}>${l}</button>`)}
    </div>

    ${sec==='cuentas'&&html`<div>
      <p style=${sSecT}>MIS CUENTAS</p>
      ${data.wallets.map(w=>html`<div key=${w.id} style=${{...sCard2(),display:'flex',gap:10,alignItems:'center'}}>
        <${Dot} col=${w.color} size=${10}/>
        <div style=${{flex:1}}><p style=${{fontSize:14,fontWeight:700}}>${w.name}</p><p style=${{fontSize:11,color:C.muted}}>${fARS(w.balance)} · ${fUSD(w.balanceUSD||0)}${w.tna>0?` · TNA ${w.tna}%`:''}</p></div>
        <button onClick=${()=>setEditW({...w})} style=${{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:14}}>✎</button>
        <button onClick=${()=>delWallet(w.id)} style=${{background:'transparent',border:'none',color:C.red+'88',cursor:'pointer',fontSize:14}}>✕</button>
      </div>`)}
      <p style=${{...sSecT,marginTop:14}}>AGREGAR CUENTA</p>
      <label style=${sLbl}>Nombre</label><input style=${sInp} placeholder="Ej: Lemon Cash" value=${nw.name} onInput=${e=>setNw({...nw,name:e.target.value})}/>
      <div style=${sRow2}>
        <div style=${{flex:1}}><label style=${sLbl}>ARS</label><input style=${sInp} type="number" value=${nw.balance} onInput=${e=>setNw({...nw,balance:e.target.value})}/></div>
        <div style=${{flex:1}}><label style=${sLbl}>USD</label><input style=${sInp} type="number" value=${nw.balanceUSD} onInput=${e=>setNw({...nw,balanceUSD:e.target.value})}/></div>
      </div>
      <label style=${sLbl}>TNA %</label><input style=${sInp} type="number" placeholder="0" value=${nw.tna} onInput=${e=>setNw({...nw,tna:e.target.value})}/>
      <label style=${sLbl}>Color</label><${CP} val=${nw.color} onChange=${c=>setNw({...nw,color:c})}/>
      <button style=${sBtn()} onClick=${addWallet}>Agregar cuenta</button>
      ${editW&&html`<${Modal} title=${`Editar — ${editW.name}`} onClose=${()=>setEditW(null)}>
        <label style=${sLbl}>Nombre</label><input style=${sInp} value=${editW.name} onInput=${e=>setEditW({...editW,name:e.target.value})}/>
        <div style=${sRow2}>
          <div style=${{flex:1}}><label style=${sLbl}>ARS</label><input style=${sInp} type="number" value=${editW.balance} onInput=${e=>setEditW({...editW,balance:Number(e.target.value)})}/></div>
          <div style=${{flex:1}}><label style=${sLbl}>USD</label><input style=${sInp} type="number" value=${editW.balanceUSD||0} onInput=${e=>setEditW({...editW,balanceUSD:Number(e.target.value)})}/></div>
        </div>
        <label style=${sLbl}>TNA %</label><input style=${sInp} type="number" value=${editW.tna||0} onInput=${e=>setEditW({...editW,tna:Number(e.target.value)})}/>
        <label style=${sLbl}>Color</label><${CP} val=${editW.color} onChange=${c=>setEditW({...editW,color:c})}/>
        <button style=${sBtn()} onClick=${()=>{persist({...data,wallets:data.wallets.map(w=>w.id===editW.id?editW:w)});toast('Actualizada ✓');setEditW(null)}}>Guardar</button>
      </${Modal}>`}
    </div>`}

    ${sec==='tarjetas'&&html`<div>${data.cards.map(card=>html`<${CardEdit} key=${card.id} card=${card} data=${data} persist=${persist} toast=${toast}/>`)}</div>`}

    ${sec==='cats'&&html`<div>
      <p style=${sSecT}>PERSONALIZADAS</p>
      ${[...(data.customCategories?.expense||[]),...(data.customCategories?.income||[])].length===0&&html`<p style=${{color:C.muted,fontSize:13,marginBottom:12}}>Sin categorías personalizadas.</p>`}
      ${[...(data.customCategories?.expense||[]),...(data.customCategories?.income||[])].map(c=>html`<div key=${c.id} style=${{...sCard2({marginBottom:8}),display:'flex',gap:8,alignItems:'center'}}>
        <${Dot} col=${c.color} size=${8}/><span style=${{flex:1,fontSize:13,fontWeight:600}}>${c.name}</span>
        <${Badge} label=${c.type==='expense'?'Gasto':'Ingreso'} col=${c.type==='expense'?C.red:C.green}/>
        <button onClick=${()=>delCat(c.id,c.type)} style=${{background:'transparent',border:'none',color:C.red+'88',cursor:'pointer',fontSize:14}}>✕</button>
      </div>`)}
      <p style=${{...sSecT,marginTop:14}}>AGREGAR</p>
      <label style=${sLbl}>Nombre</label><input style=${sInp} placeholder="Ej: Mascota" value=${nc.name} onInput=${e=>setNc({...nc,name:e.target.value})}/>
      <label style=${sLbl}>Tipo</label>
      <select style=${sInp} value=${nc.type} onChange=${e=>setNc({...nc,type:e.target.value})}><option value="expense">Gasto</option><option value="income">Ingreso</option></select>
      <label style=${sLbl}>Color</label><${CP} val=${nc.color} onChange=${c=>setNc({...nc,color:c})}/>
      <button style=${sBtn()} onClick=${addCat}>Agregar categoría</button>
    </div>`}

    ${sec==='tc'&&html`<div>
      <p style=${{fontSize:11,color:C.muted,marginBottom:12}}>Última actualización: ${tc.updatedAt||'—'}</p>
      ${[['oficial','Oficial'],['mep','MEP / Bolsa'],['blue','Blue / Informal']].map(([k,l])=>html`<div key=${k} style=${{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <span style=${{flex:1,fontSize:13,color:C.sub}}>${l}</span>
        <input style=${{...sInp,width:120}} type="number" value=${tc[k]} onInput=${e=>setTc({...tc,[k]:Number(e.target.value)})}/>
      </div>`)}
      <label style=${sLbl}>Usar para cálculos</label>
      <select style=${sInp} value=${tc.mode} onChange=${e=>setTc({...tc,mode:e.target.value})}><option value="oficial">Oficial</option><option value="mep">MEP</option><option value="blue">Blue</option></select>
      <button style=${sBtn()} onClick=${()=>{persist({...data,tc:{...tc,updatedAt:today()}});toast('TC actualizado ✓')}}>Guardar</button>
    </div>`}

    ${sec==='ia'&&html`<div>
      <p style=${{...sSecT,marginBottom:4}}>ASISTENTE IA — GEMINI</p>
      <div style=${sCard({border:`1px solid ${C.green}33`})}>
        <p style=${{fontSize:14,fontWeight:700,color:C.green,marginBottom:10}}>🔑 La API Key va en Netlify</p>
        <p style=${{fontSize:13,color:C.sub,lineHeight:1.7,marginBottom:14}}>La clave de Gemini se guarda de forma segura en el servidor de Netlify, no en la app. Seguí estos pasos:</p>
        ${[
          ['1','Entrá a netlify.com → tu proyecto → Site configuration → Environment variables'],
          ['2','Agregá una variable llamada exactamente: GEMINI_API_KEY'],
          ['3','El valor es tu clave de Google AI Studio (aistudio.google.com → Get API Key)'],
          ['4','Hacé un redeploy del sitio para que tome efecto'],
        ].map(([n,t])=>html`<div key=${n} style=${{display:'flex',gap:10,marginBottom:10,alignItems:'flex-start'}}>
          <div style=${{width:22,height:22,borderRadius:'50%',background:C.green,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,flexShrink:0}}>${n}</div>
          <p style=${{fontSize:12,color:C.sub,lineHeight:1.5}}>${t}</p>
        </div>`)}
      </div>
      <div style=${sCard2()}>
        <p style=${{fontSize:12,color:C.muted}}>💡 Gemini 1.5 Flash es <b style=${{color:C.green}}>gratuito</b> con límites generosos (1500 req/día). Suficiente para uso personal.</p>
      </div>
    </div>`}

    ${sec==='datos'&&html`<div>
      <div style=${sCard()}>
        <p style=${sSecT}>BACKUP</p>
        ${[['📦 Exportar backup (JSON)',exportJSON],['📊 Exportar movimientos (CSV)',exportCSV],['📥 Importar backup (JSON)',importJSON]].map(([l,fn])=>html`<button key=${l} style=${{...sBtnSm,width:'100%',marginBottom:8,textAlign:'center'}} onClick=${fn}>${l}</button>`)}
      </div>
      <div style=${sCard({border:`1px solid ${C.red}33`})}>
        <p style=${{...sSecT,color:C.red}}>ZONA DE PELIGRO</p>
        <button style=${{...sBtnSm,width:'100%',textAlign:'center',color:C.red}} onClick=${()=>{if(!confirm('¿Resetear toda la app?'))return;if(!confirm('¿Seguro? Se borran TODOS los datos.'))return;persist({...INIT,wallets:INIT.wallets.map(w=>({...w})),cards:INIT.cards.map(c=>({...c})),goals:INIT.goals.map(g=>({...g}))})}}>🗑 Resetear app</button>
      </div>
    </div>`}
  </div>`;
}

function CardEdit({card,data,persist,toast}){
  const [open,setOpen]=useState(false);
  return html`<div style=${sCard2()}>
    <div style=${{display:'flex',alignItems:'center',gap:8}}>
      <span style=${{fontSize:18}}>💳</span>
      <p style=${{flex:1,fontSize:14,fontWeight:700}}>${card.name}</p>
      <p style=${{fontSize:11,color:C.muted}}>Cierre ${card.closeDay}</p>
      <button onClick=${()=>setOpen(!open)} style=${{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:13}}>${open?'▲':'✎'}</button>
    </div>
    ${open&&html`<div style=${{marginTop:10}}>
      <label style=${sLbl}>Día de cierre</label><input style=${sInp} type="number" defaultValue=${card.closeDay} onBlur=${e=>persist({...data,cards:data.cards.map(c=>c.id===card.id?{...c,closeDay:Number(e.target.value)}:c)})}/>
      <label style=${sLbl}>Próximo vencimiento</label><input style=${sInp} type="date" defaultValue=${card.nextDueDate} onChange=${e=>persist({...data,cards:data.cards.map(c=>c.id===card.id?{...c,nextDueDate:e.target.value}:c)})}/>
      <p style=${{fontSize:11,color:C.green,marginTop:8}}>✓ Guardado automáticamente</p>
    </div>`}
  </div>`;
}

// ═══════════ TX FORM ═══════════
function TxForm({data,persist,onClose,toast}){
  const [type,setType]=useState('expense');
  const [cat,setCat]=useState(DEF_EXP[0]);
  const [amt,setAmt]=useState('');
  const [cur,sCur]=useState('ARS');
  const [wallet,setWallet]=useState(data.wallets[1]?.id||data.wallets[0]?.id||'naranjax');
  const [wTo,setWTo]=useState(data.wallets[0]?.id||'galicia');
  const [cardId,setCardId]=useState('');
  const [inst,setInst]=useState(1);
  const [date,setDate]=useState(today());
  const [note,setNote]=useState('');
  const tc=data.tc,r=getR(tc);
  const allCats=getCats(type==='income'?'income':'expense',data);
  const TC_COL={expense:C.red,income:C.green,transfer:C.blue};

  const submit=()=>{
    if(!amt||isNaN(Number(amt))||Number(amt)<=0){toast('Monto inválido','err');return};
    const base={id:uid(),type,category:cat,amount:Number(amt),currency:cur,wallet,date,note};
    if(type==='transfer'){
      const a=cur==='ARS'?Number(amt):Number(amt)*r;
      persist({...data,transactions:[...data.transactions,{...base,id:uid(),category:'Transferencia',wallet:wTo},{...base,id:uid(),category:'Transferencia'}],wallets:data.wallets.map(w=>w.id===wallet?{...w,balance:w.balance-a}:w.id===wTo?{...w,balance:w.balance+a}:w)});
      toast('Transferencia registrada ✓');onClose();return;
    }
    if(inst>1&&cardId){
      const txs=[];for(let i=1;i<=inst;i++){const d=new Date(date);d.setMonth(d.getMonth()+(i-1));txs.push({...base,id:uid(),date:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,cardId,installments:inst,installmentNum:i,groupId:base.id})};
      persist({...data,transactions:[...data.transactions,...txs]});toast(`${inst} cuotas registradas ✓`);onClose();return;
    }
    persist({...data,transactions:[...data.transactions,{...base,cardId:cardId||undefined,installments:1,installmentNum:1}]});
    toast(type==='income'?'Ingreso registrado ✓':'Gasto registrado ✓');onClose();
  };

  return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,.87)',zIndex:50,display:'flex',alignItems:'flex-end'}}>
    <div style=${{background:C.c1,borderRadius:'22px 22px 0 0',padding:'22px 18px 48px',width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',margin:'0 auto',border:`1px solid ${C.border}`}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <p style=${{fontSize:17,fontWeight:900}}>Nuevo movimiento</p>
        <button onClick=${onClose} style=${{background:C.c3,border:'none',color:C.sub,fontSize:16,cursor:'pointer',borderRadius:8,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style=${{...sRow2,marginBottom:4}}>
        ${[['expense','Gasto'],['income','Ingreso'],['transfer','Transferencia']].map(([v,l])=>html`<button key=${v} style=${{...sChip(type===v,TC_COL[v]),flex:1}} onClick=${()=>{setType(v);setCat(v==='income'?getCats('income',data)[0]:getCats('expense',data)[0])}}>${l}</button>`)}
      </div>
      ${type==='transfer'?html`<div>
        <label style=${sLbl}>De</label><select style=${sInp} value=${wallet} onChange=${e=>setWallet(e.target.value)}>${data.wallets.map(w=>html`<option key=${w.id} value=${w.id}>${w.name} (${fARS(w.balance)})</option>`)}</select>
        <label style=${sLbl}>A</label><select style=${sInp} value=${wTo} onChange=${e=>setWTo(e.target.value)}>${data.wallets.filter(w=>w.id!==wallet).map(w=>html`<option key=${w.id} value=${w.id}>${w.name}</option>`)}</select>
      </div>`:html`<div>
        <label style=${sLbl}>Categoría</label><select style=${sInp} value=${cat} onChange=${e=>setCat(e.target.value)}>${allCats.map(c=>html`<option key=${c}>${c}</option>`)}</select>
        <label style=${sLbl}>Billetera</label><select style=${sInp} value=${wallet} onChange=${e=>setWallet(e.target.value)}>${data.wallets.map(w=>html`<option key=${w.id} value=${w.id}>${w.name} (${fARS(w.balance)})</option>`)}</select>
      </div>`}
      ${type==='expense'&&html`<div>
        <label style=${sLbl}>Tarjeta (opcional)</label>
        <select style=${sInp} value=${cardId} onChange=${e=>setCardId(e.target.value)}><option value="">Sin tarjeta</option>${data.cards.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select>
        ${cardId&&html`<div><label style=${sLbl}>Cuotas</label><select style=${sInp} value=${inst} onChange=${e=>setInst(Number(e.target.value))}>${[1,2,3,6,9,12,18,24].map(n=>html`<option key=${n} value=${n}>${n===1?'Sin cuotas':`${n} cuotas`}</option>`)}</select></div>`}
      </div>`}
      <label style=${sLbl}>Monto</label>
      <div style=${sRow2}>
        <input style=${{...sInp,flex:1}} type="number" placeholder="0" value=${amt} onInput=${e=>setAmt(e.target.value)}/>
        <select style=${{...sInp,width:80}} value=${cur} onChange=${e=>sCur(e.target.value)}><option value="ARS">ARS</option><option value="USD">USD</option></select>
      </div>
      ${amt&&html`<p style=${{fontSize:11,color:C.muted,marginTop:4}}>${cur==='USD'?`≈ ${fARS(Number(amt)*r)}`:`≈ ${fUSD(Number(amt)/r)}`}</p>`}
      <label style=${sLbl}>Fecha</label><input style=${sInp} type="date" value=${date} onChange=${e=>setDate(e.target.value)}/>
      <label style=${sLbl}>Nota (opcional)</label><input style=${sInp} placeholder="Descripción..." value=${note} onInput=${e=>setNote(e.target.value)}/>
      <button style=${sBtn(TC_COL[type],type==='income'?'#000':'#fff')} onClick=${submit}>Guardar movimiento</button>
    </div>
  </div>`;
}

// ═══════════ RENDER ═══════════
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
